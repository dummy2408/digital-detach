<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Phone body -->
  <rect x="168" y="72" width="176" height="368" rx="28" ry="28" fill="#1e1b4b" stroke="#312e81" stroke-width="4"/>
  <!-- Phone screen -->
  <rect x="184" y="108" width="144" height="276" rx="8" ry="8" fill="url(#screen)"/>
  <!-- Phone notch -->
  <rect x="228" y="84" width="56" height="8" rx="4" ry="4" fill="#312e81"/>
  <!-- Home button circle -->
  <circle cx="256" cy="416" r="12" fill="#312e81" stroke="#4338ca" stroke-width="2"/>
  <!-- Pulse/heartbeat line on screen -->
  <polyline 
    points="190,250 220,250 232,210 248,290 264,220 276,270 290,250 322,250" 
    fill="none" 
    stroke="#ef4444" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  <!-- Shield outline behind phone (subtle) -->
  <path d="M256,46 L340,80 L340,180 Q340,260 256,310 Q172,260 172,180 L172,80 Z" 
    fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="6" stroke-linejoin="round"/>
</svg>
